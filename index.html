<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управление аккаунтами Telegram</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        
        body {
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            padding: 16px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            width: 100%;
            flex: 1;
        }
        
        h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 20px;
            color: var(--tg-theme-text-color, #000000);
        }
        
        .stats {
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: var(--tg-theme-button-color, #40a7e3);
        }
        
        .stat-label {
            font-size: 14px;
            opacity: 0.7;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            font-size: 18px;
            color: var(--tg-theme-hint-color, #999999);
        }
        
        .account-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .account-card {
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            border-radius: 12px;
            padding: 16px;
            transition: transform 0.2s;
        }
        
        .account-card:hover {
            transform: translateY(-2px);
        }
        
        .account-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            cursor: pointer;
        }
        
        .account-phone {
            font-weight: 600;
            font-size: 16px;
        }
        
        .account-country {
            font-size: 14px;
            opacity: 0.7;
            margin-left: 8px;
        }
        
        .account-safe {
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .safe-on {
            background: #4caf50;
            color: white;
        }
        
        .safe-off {
            background: #f44336;
            color: white;
        }
        
        .account-details {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--tg-theme-hint-color, #cccccc);
            display: none;
        }
        
        .account-details.expanded {
            display: block;
        }
        
        .detail-row {
            display: flex;
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        .detail-label {
            width: 100px;
            opacity: 0.7;
        }
        
        .detail-value {
            flex: 1;
            font-weight: 500;
        }
        
        .note-text {
            background: var(--tg-theme-bg-color, #ffffff);
            padding: 8px;
            border-radius: 8px;
            margin: 8px 0;
            font-style: italic;
            white-space: pre-wrap;
            word-break: break-word;
        }
        
        .button-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 12px;
        }
        
        .btn {
            border: none;
            border-radius: 8px;
            padding: 10px 16px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.2s;
            background: var(--tg-theme-button-color, #40a7e3);
            color: var(--tg-theme-button-text-color, #ffffff);
            flex: 1;
            min-width: 80px;
        }
        
        .btn:hover {
            opacity: 0.8;
        }
        
        .btn-danger {
            background: #f44336;
        }
        
        .btn-secondary {
            background: var(--tg-theme-secondary-bg-color, #e0e0e0);
            color: var(--tg-theme-text-color, #000000);
        }
        
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .modal {
            background: var(--tg-theme-bg-color, #ffffff);
            border-radius: 16px;
            padding: 20px;
            width: 90%;
            max-width: 400px;
        }
        
        .modal h3 {
            margin-bottom: 16px;
            font-size: 20px;
        }
        
        .modal input, .modal textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--tg-theme-hint-color, #cccccc);
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 16px;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
        }
        
        .modal textarea {
            min-height: 100px;
            resize: vertical;
        }
        
        .modal-buttons {
            display: flex;
            gap: 10px;
        }
        
        .hidden {
            display: none;
        }
        
        .error-message {
            background: #f44336;
            color: white;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 16px;
            text-align: center;
        }
        
        .success-message {
            background: #4caf50;
            color: white;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 16px;
            text-align: center;
        }
        
        .add-account-btn {
            margin-top: 20px;
            width: 100%;
            padding: 14px;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📱 Мои аккаунты</h1>
        
        <div id="stats" class="stats hidden">
            <div class="stat-item">
                <div class="stat-value" id="total-accounts">0</div>
                <div class="stat-label">Всего</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="safe-accounts">0</div>
                <div class="stat-label">🛡️ Защита</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="notes-count">0</div>
                <div class="stat-label">📝 Заметки</div>
            </div>
        </div>
        
        <div id="loading" class="loading">
            Загрузка аккаунтов...
        </div>
        
        <div id="error" class="error-message hidden"></div>
        <div id="success" class="success-message hidden"></div>
        
        <div id="accounts-container" class="account-grid hidden"></div>
        
        <button id="add-account" class="btn add-account-btn hidden" onclick="addAccount()">➕ Добавить аккаунт</button>
    </div>
    
    <!-- Модальное окно для заметки -->
    <div id="note-modal" class="modal-overlay hidden">
        <div class="modal">
            <h3>📝 Редактировать заметку</h3>
            <textarea id="note-text" placeholder="Введите текст заметки..."></textarea>
            <div class="modal-buttons">
                <button class="btn btn-secondary" onclick="closeNoteModal()">Отмена</button>
                <button class="btn" onclick="saveNote()">Сохранить</button>
            </div>
        </div>
    </div>
    
    <!-- Модальное окно для передачи аккаунта -->
    <div id="transfer-modal" class="modal-overlay hidden">
        <div class="modal">
            <h3>📤 Передать аккаунт</h3>
            <input type="number" id="transfer-user-id" placeholder="ID пользователя" min="1">
            <div class="modal-buttons">
                <button class="btn btn-secondary" onclick="closeTransferModal()">Отмена</button>
                <button class="btn" onclick="transferAccount()">Передать</button>
            </div>
        </div>
    </div>
    
    <!-- Модальное окно подтверждения удаления -->
    <div id="delete-modal" class="modal-overlay hidden">
        <div class="modal">
            <h3>🗑️ Удаление аккаунта</h3>
            <p>Вы уверены, что хотите удалить этот аккаунт?</p>
            <div class="modal-buttons">
                <button class="btn btn-secondary" onclick="closeDeleteModal()">Отмена</button>
                <button class="btn btn-danger" onclick="confirmDelete()">Удалить</button>
            </div>
        </div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.MainButton.textColor = '#FFFFFF';
        tg.MainButton.color = '#40a7e3';
        
        let accounts = [];
        let currentPhone = null;
        let currentAction = null;
        
        // Инициализация
        tg.ready();
        tg.MainButton.hide();
        
        // Запрашиваем аккаунты при загрузке
        sendRequest({ action: 'get_accounts' });
        
        function sendRequest(data) {
            tg.sendData(JSON.stringify(data));
        }
        
        // Обработка ответа от бота
        tg.onEvent('mainButtonClicked', function() {
            // Этот обработчик срабатывает, когда бот отвечает через answerWebAppQuery
            // Данные приходят в event.data
        });
        
        // Перехватываем данные, которые бот отправляет через answerWebAppQuery
        // Они приходят в виде сообщения от бота в чате? Нет, они приходят через событие 'popupClosed'? 
        // В документации сказано, что ответ приходит в событии 'mainButtonClicked' с параметром data.
        // Но чтобы это работало, нужно использовать tg.onEvent('mainButtonClicked', callback) и там читать event.data.
        // Однако мы используем другой подход: после отправки данных мы ожидаем, что бот ответит, и мы получим это событие.
        // Пока что просто покажем загрузку.
        
        // Вместо этого мы будем использовать глобальный обработчик сообщений? Нет.
        // Правильно: мы отправляем запрос, и ждем, что бот ответит через answerWebAppQuery.
        // Telegram WebApp получает этот ответ и генерирует событие 'mainButtonClicked', где в event.data лежит результат.
        tg.onEvent('mainButtonClicked', function(event) {
            try {
                const response = JSON.parse(event.data);
                if (response.ok) {
                    if (response.accounts) {
                        // Получили список аккаунтов
                        accounts = response.accounts;
                        renderAccounts();
                        showSuccess('Данные обновлены');
                    } else {
                        // Какое-то действие выполнено
                        showSuccess('Операция выполнена успешно');
                        // Обновляем список аккаунтов
                        sendRequest({ action: 'get_accounts' });
                    }
                } else {
                    showError(response.error || 'Произошла ошибка');
                }
            } catch (e) {
                showError('Ошибка обработки ответа');
            }
        });
        
        function renderAccounts() {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('stats').classList.remove('hidden');
            document.getElementById('add-account').classList.remove('hidden');
            
            const container = document.getElementById('accounts-container');
            container.innerHTML = '';
            
            if (accounts.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding:40px;">У вас пока нет аккаунтов</div>';
                container.classList.remove('hidden');
                return;
            }
            
            // Обновляем статистику
            document.getElementById('total-accounts').innerText = accounts.length;
            document.getElementById('safe-accounts').innerText = accounts.filter(a => a.safe_mode).length;
            document.getElementById('notes-count').innerText = accounts.filter(a => a.note).length;
            
            accounts.forEach(acc => {
                const card = document.createElement('div');
                card.className = 'account-card';
                card.dataset.phone = acc.phone;
                
                const safeClass = acc.safe_mode ? 'safe-on' : 'safe-off';
                const safeText = acc.safe_mode ? '🛡️ Защита ВКЛ' : '⚪ Защита ВЫКЛ';
                
                card.innerHTML = `
                    <div class="account-header" onclick="toggleDetails('${acc.phone}')">
                        <div>
                            <span class="account-phone">${acc.phone}</span>
                            <span class="account-country">${acc.country}</span>
                        </div>
                        <div class="account-safe ${safeClass}">${safeText}</div>
                    </div>
                    <div class="account-details" id="details-${acc.phone}">
                        <div class="detail-row">
                            <span class="detail-label">ID:</span>
                            <span class="detail-value">${acc.username ? '@' + acc.username : 'Не указан'}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Имя:</span>
                            <span class="detail-value">${acc.first_name || 'Не указано'} ${acc.last_name || ''}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Заметка:</span>
                            <span class="detail-value" id="note-${acc.phone}">${acc.note || 'Нет'}</span>
                        </div>
                        ${acc.note ? `<div class="note-text">${acc.note}</div>` : ''}
                        <div class="button-group">
                            <button class="btn" onclick="toggleSafeMode('${acc.phone}')">${acc.safe_mode ? 'Выключить защиту' : 'Включить защиту'}</button>
                            <button class="btn" onclick="editNote('${acc.phone}')">📝 Заметка</button>
                            <button class="btn" onclick="showTransferModal('${acc.phone}')">📤 Передать</button>
                            <button class="btn btn-danger" onclick="showDeleteModal('${acc.phone}')">🗑️ Удалить</button>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
            
            container.classList.remove('hidden');
        }
        
        function toggleDetails(phone) {
            const details = document.getElementById(`details-${phone}`);
            details.classList.toggle('expanded');
        }
        
        function toggleSafeMode(phone) {
            sendRequest({ action: 'toggle_safe_mode', phone });
        }
        
        function editNote(phone) {
            currentPhone = phone;
            const acc = accounts.find(a => a.phone === phone);
            document.getElementById('note-text').value = acc.note || '';
            document.getElementById('note-modal').classList.remove('hidden');
        }
        
        function closeNoteModal() {
            document.getElementById('note-modal').classList.add('hidden');
            currentPhone = null;
        }
        
        function saveNote() {
            const note = document.getElementById('note-text').value.trim();
            if (currentPhone) {
                sendRequest({ action: 'update_note', phone: currentPhone, note });
                closeNoteModal();
            }
        }
        
        function showTransferModal(phone) {
            currentPhone = phone;
            document.getElementById('transfer-user-id').value = '';
            document.getElementById('transfer-modal').classList.remove('hidden');
        }
        
        function closeTransferModal() {
            document.getElementById('transfer-modal').classList.add('hidden');
            currentPhone = null;
        }
        
        function transferAccount() {
            const userId = document.getElementById('transfer-user-id').value.trim();
            if (!userId) {
                showError('Введите ID пользователя');
                return;
            }
            sendRequest({ action: 'transfer_account', phone: currentPhone, new_owner_id: userId });
            closeTransferModal();
        }
        
        function showDeleteModal(phone) {
            currentPhone = phone;
            document.getElementById('delete-modal').classList.remove('hidden');
        }
        
        function closeDeleteModal() {
            document.getElementById('delete-modal').classList.add('hidden');
            currentPhone = null;
        }
        
        function confirmDelete() {
            if (currentPhone) {
                sendRequest({ action: 'delete_account', phone: currentPhone });
                closeDeleteModal();
            }
        }
        
        function addAccount() {
            // Перенаправляем пользователя на команду /add_account в чате
            tg.close();
            // Можно открыть ссылку на бота с командой
            window.location.href = `https://t.me/akkaynti_BOT?start=add_account`;
        }
        
        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.innerText = message;
            errorDiv.classList.remove('hidden');
            setTimeout(() => errorDiv.classList.add('hidden'), 3000);
        }
        
        function showSuccess(message) {
            const successDiv = document.getElementById('success');
            successDiv.innerText = message;
            successDiv.classList.remove('hidden');
            setTimeout(() => successDiv.classList.add('hidden'), 3000);
        }
    </script>
</body>
</html>
