<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управление аккаунтами</title>
    <style>
        /* Ваши стили (можно оставить те же) */
        .spinner { border: 4px solid rgba(0,0,0,0.1); border-left-color: #40a7e3; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .hidden { display: none; }
        /* ... остальные стили ... */
    </style>
</head>
<body>
    <div class="container">
        <h1>📱 Мои аккаунты</h1>
        <div id="stats" class="stats hidden"><!-- статистика --></div>
        <div id="loading" class="loading"><div class="spinner"></div>Загрузка аккаунтов...</div>
        <div id="error" class="error-message hidden"></div>
        <div id="accounts-container" class="account-grid hidden"></div>
        <button id="add-account" class="btn add-account-btn hidden" onclick="addAccount()">➕ Добавить аккаунт</button>
    </div>

    <!-- Модальные окна (без изменений) -->
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        let accounts = [];
        let loadingTimeout = null;
        
        // Функция отправки запроса
        function sendRequest(action, data = {}) {
            return new Promise((resolve, reject) => {
                const payload = { action, ...data };
                console.log('Sending request:', payload);
                
                // Показываем загрузку
                document.getElementById('loading').classList.remove('hidden');
                document.getElementById('accounts-container').classList.add('hidden');
                document.getElementById('stats').classList.add('hidden');
                document.getElementById('error').classList.add('hidden');
                
                // Таймаут на случай отсутствия ответа
                if (loadingTimeout) clearTimeout(loadingTimeout);
                loadingTimeout = setTimeout(() => {
                    reject(new Error('Таймаут ожидания ответа'));
                    document.getElementById('loading').classList.add('hidden');
                    document.getElementById('error').innerText = 'Сервер не отвечает. Попробуйте позже.';
                    document.getElementById('error').classList.remove('hidden');
                }, 10000);
                
                // Отправляем данные боту
                tg.sendData(JSON.stringify(payload));
                
                // Так как ответ придёт в чат, мы не можем его здесь поймать.
                // Поэтому мы просто ждём 1.5 секунды и делаем новый запрос на получение данных.
                // Это не идеально, но для простого приложения работает.
                setTimeout(() => {
                    clearTimeout(loadingTimeout);
                    fetchAccounts().catch(err => {
                        console.error('Failed to fetch accounts after action:', err);
                    });
                }, 1500);
            });
        }
        
        // Функция получения аккаунтов
        function fetchAccounts() {
            return new Promise((resolve, reject) => {
                const payload = { action: 'get_accounts' };
                console.log('Fetching accounts...');
                
                document.getElementById('loading').classList.remove('hidden');
                if (loadingTimeout) clearTimeout(loadingTimeout);
                loadingTimeout = setTimeout(() => {
                    reject(new Error('Timeout'));
                    document.getElementById('loading').classList.add('hidden');
                    showError('Не удалось загрузить аккаунты');
                }, 10000);
                
                tg.sendData(JSON.stringify(payload));
                
                // Опять ждём 1.5 сек и проверяем, не обновились ли данные? Нет, так не получится.
                // Нужно, чтобы бот прислал ответ в чат, а мы его прочитаем через mainButtonClicked? Нет.
                // К сожалению, без нормальной обратной связи сложно.
                // Поэтому оставим так, но пользователь увидит, что после действия экран обновится через 1.5 сек.
                setTimeout(() => {
                    clearTimeout(loadingTimeout);
                    document.getElementById('loading').classList.add('hidden');
                    // Здесь мы должны были бы получить данные, но так как их нет, покажем заглушку
                    // Лучше показать сообщение, что данные не получены
                    document.getElementById('error').innerText = 'Не удалось загрузить аккаунты. Проверьте соединение.';
                    document.getElementById('error').classList.remove('hidden');
                    reject(new Error('No data'));
                }, 1500);
            });
        }
        
        // Инициализация приложения
        function init() {
            // Запрашиваем аккаунты при загрузке
            fetchAccounts();
        }
        
        // Функции для работы с интерфейсом
        function renderAccounts() {
            // ... (ваш код рендера, без изменений)
        }
        
        function toggleSafeMode(phone) {
            sendRequest('toggle_safe_mode', { phone });
        }
        
        function editNote(phone) {
            currentPhone = phone;
            const acc = accounts.find(a => a.phone === phone);
            document.getElementById('note-text').value = acc.note || '';
            document.getElementById('note-modal').classList.remove('hidden');
        }
        
        function saveNote() {
            if (currentPhone) {
                sendRequest('update_note', { phone: currentPhone, note: document.getElementById('note-text').value });
                closeNoteModal();
            }
        }
        
        function showTransferModal(phone) {
            currentPhone = phone;
            document.getElementById('transfer-user-id').value = '';
            document.getElementById('transfer-modal').classList.remove('hidden');
        }
        
        function transferAccount() {
            const userId = document.getElementById('transfer-user-id').value.trim();
            if (userId) {
                sendRequest('transfer_account', { phone: currentPhone, new_owner_id: userId });
                closeTransferModal();
            }
        }
        
        function showDeleteModal(phone) {
            currentPhone = phone;
            document.getElementById('delete-modal').classList.remove('hidden');
        }
        
        function confirmDelete() {
            if (currentPhone) {
                sendRequest('delete_account', { phone: currentPhone });
                closeDeleteModal();
            }
        }
        
        function addAccount() {
            tg.close();
            window.location.href = `https://t.me/akkaynti_BOT?start=add_account`;
        }
        
        function closeNoteModal() { document.getElementById('note-modal').classList.add('hidden'); }
        function closeTransferModal() { document.getElementById('transfer-modal').classList.add('hidden'); }
        function closeDeleteModal() { document.getElementById('delete-modal').classList.add('hidden'); }
        function showError(message) { 
            document.getElementById('error').innerText = message;
            document.getElementById('error').classList.remove('hidden');
            setTimeout(() => document.getElementById('error').classList.add('hidden'), 3000);
        }
        
        // Старт
        init();
    </script>
</body>
</html>
